<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界の大富豪 九州編</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap');
:root {
  --gold:#c9820a; --gold2:#e8a020; --gold3:#f5c842; --gold-light:#fde98a; --gold-pale:#fff8e1;
  --bg:#fffdf5; --bg2:#fff9e6; --bg3:#fef3c7; --white:#ffffff;
  --dark:#1a1200; --dark2:#3d2e00;
  --text:#2a1f00; --text2:#6b4f00; --text3:#9a7a20;
  --green:#2e7d32; --red:#c62828; --border:#e8c84a; --shadow:rgba(201,130,10,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

/* タイトル */
#title-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#fffbe6 0%,#fde98a 50%,#f5c842 100%);
  position:relative;overflow:hidden;text-align:center;padding:2rem;
}
.coin-rain{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.coin-drop{position:absolute;border-radius:50%;animation:coinFall linear infinite;opacity:0;}
.coin-drop.big{width:22px;height:22px;background:radial-gradient(circle at 30% 28%,#fffde0,#ffe44d 30%,#f5c518 55%,#d4a017 80%,#b8860b 100%);box-shadow:0 0 14px 4px rgba(255,220,0,0.85),0 0 30px 6px rgba(255,200,0,0.35);}
.coin-drop.med{width:16px;height:16px;background:radial-gradient(circle at 32% 28%,#fffbe0,#ffd700 35%,#f0b800 60%,#c8980a 90%);box-shadow:0 0 10px 3px rgba(255,215,0,0.8),0 0 20px 4px rgba(255,180,0,0.3);}
.coin-drop.small{width:10px;height:10px;background:radial-gradient(circle at 30% 28%,#fffcd0,#ffd700 40%,#e8a800 70%,#c08800 100%);box-shadow:0 0 8px 3px rgba(255,210,0,0.75);}
.coin-drop::after{content:'';position:absolute;top:16%;left:16%;width:32%;height:32%;border-radius:50%;background:rgba(255,255,220,0.85);filter:blur(1px);}
.coin-drop.sparkle::before{content:'✦';position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:10px;color:#ffe44d;text-shadow:0 0 6px #fff,0 0 12px #ffd700;animation:sparklePop 0.6s ease-out infinite alternate;}
@keyframes sparklePop{0%{opacity:0.3;transform:translateX(-50%) scale(0.7);}100%{opacity:1;transform:translateX(-50%) scale(1.2);}}
@keyframes coinFall{0%{transform:translateY(-60px) rotateY(0deg) scale(0.7);opacity:0;}6%{opacity:1;}50%{transform:translateY(52vh) rotateY(200deg) scale(1.05);}93%{opacity:1;}100%{transform:translateY(108vh) rotateY(400deg) scale(0.8);opacity:0;}}

.title-episode{position:relative;font-size:0.8rem;letter-spacing:0.5em;color:var(--dark2);margin-bottom:0.5rem;font-weight:700;}
.title-main{position:relative;font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;font-size:clamp(2.8rem,10vw,5.5rem);font-weight:900;color:var(--dark);text-shadow:3px 3px 0 rgba(201,130,10,0.3);}
.title-badge{position:relative;display:inline-block;background:linear-gradient(135deg,var(--dark),var(--dark2));color:var(--gold3);font-size:1rem;font-weight:900;padding:0.4rem 1.5rem;border-radius:30px;letter-spacing:0.2em;margin-top:0.7rem;border:2px solid var(--gold3);}
.title-sub{position:relative;font-size:0.9rem;color:var(--dark2);margin-top:1rem;letter-spacing:0.15em;font-weight:700;}
.title-series{position:relative;font-size:0.78rem;color:var(--text2);margin-top:0.5rem;}
.start-btn{position:relative;margin-top:2.5rem;padding:1rem 3rem;background:linear-gradient(135deg,var(--dark),var(--dark2));color:var(--gold3);font-size:1.2rem;font-weight:900;font-family:'Noto Sans JP',sans-serif;border:2px solid var(--gold3);border-radius:50px;cursor:pointer;letter-spacing:0.12em;box-shadow:0 4px 20px rgba(0,0,0,0.2),0 0 30px rgba(245,200,66,0.3);transition:all 0.2s;}
.start-btn:hover{transform:scale(1.04);}
.save-info{position:relative;margin-top:0.8rem;font-size:0.78rem;color:var(--dark2);}

/* ゲーム画面 */
#game-screen{display:none;}
.header{background:linear-gradient(135deg,var(--dark),var(--dark2));padding:0.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold3);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.header-title{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.1rem;font-weight:900;color:var(--gold3);}
.asset-display{text-align:right;}
.asset-label{font-size:0.65rem;color:var(--gold-light);letter-spacing:0.1em;}
.asset-amount{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.5rem;font-weight:900;color:var(--gold3);text-shadow:0 0 15px rgba(245,200,66,0.6);}

.stage-bar{background:var(--bg2);border-bottom:2px solid var(--border);padding:0.6rem 1rem;display:flex;gap:0.4rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stage-bar::-webkit-scrollbar{height:3px;}
.stage-bar::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px;}
.stage-btn{flex:0 0 auto;padding:0.4rem 0.9rem;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-size:0.82rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.stage-btn:hover{background:var(--gold-pale);border-color:var(--gold2);}
.stage-btn.active{background:linear-gradient(135deg,var(--dark),var(--dark2));color:var(--gold3);border-color:var(--gold3);}
.stage-btn.cleared{background:var(--gold3);color:var(--dark);border-color:var(--gold2);}
.stage-btn.locked{opacity:0.4;cursor:not-allowed;}

.main-content{padding:1rem;max-width:680px;margin:0 auto;}

.stage-header{background:linear-gradient(135deg,var(--dark),var(--dark2));border-radius:16px;padding:1rem 1.2rem;margin-bottom:1rem;color:var(--gold3);border:2px solid var(--gold3);box-shadow:0 4px 16px var(--shadow);}
.stage-header h2{font-size:1.2rem;font-weight:900;}
.stage-header-sub{font-size:0.78rem;color:var(--gold-light);margin-top:0.2rem;}
.progress-wrap{margin-top:0.7rem;}
.progress-bar-bg{background:rgba(255,255,255,0.15);border-radius:10px;height:8px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold-light));border-radius:10px;transition:width 0.5s;}
.progress-text{font-size:0.72rem;color:var(--gold-light);margin-top:0.3rem;}

.q-card{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:1.3rem;box-shadow:0 4px 16px var(--shadow);margin-bottom:1rem;}
.q-num{font-size:0.7rem;font-weight:900;color:var(--text3);letter-spacing:0.1em;margin-bottom:0.5rem;}
.q-text{font-size:1rem;font-weight:700;line-height:1.7;color:var(--text);margin-bottom:1rem;}
.map-hint-box{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:0.7rem 1rem;margin-bottom:1rem;font-size:0.82rem;color:var(--dark2);}
.map-hint-box .hint-label{font-weight:900;color:var(--gold);margin-bottom:0.3rem;}

.choices{display:flex;flex-direction:column;gap:0.5rem;}
.choice-btn{padding:0.8rem 1rem;background:var(--bg);border:2px solid var(--border);border-radius:12px;color:var(--text);cursor:pointer;font-size:0.95rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;text-align:left;transition:all 0.15s;display:flex;align-items:center;gap:0.6rem;}
.choice-btn:hover:not(:disabled){border-color:var(--gold2);background:var(--gold-pale);}
.choice-btn.correct{border-color:var(--green);background:#e8f5e9;color:var(--green);}
.choice-btn.wrong{border-color:var(--red);background:#ffebee;color:var(--red);}
.choice-btn:disabled{cursor:not-allowed;}
.choice-label{width:24px;height:24px;border-radius:50%;background:var(--border);color:var(--dark);font-size:0.75rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.choice-btn.correct .choice-label{background:var(--green);color:#fff;}
.choice-btn.wrong .choice-label{background:var(--red);color:#fff;}

.explanation{display:none;margin-top:0.8rem;padding:0.9rem 1rem;border-radius:10px;font-size:0.88rem;line-height:1.6;font-weight:700;}
.explanation.correct-exp{background:#e8f5e9;border:1.5px solid var(--green);color:var(--green);}
.explanation.wrong-exp{background:#fff3e0;border:1.5px solid #f57c00;color:#e65100;}

.next-q-btn{margin-top:1rem;width:100%;padding:0.8rem;background:linear-gradient(135deg,var(--dark),var(--dark2));color:var(--gold3);border:2px solid var(--gold3);border-radius:12px;font-size:1rem;font-weight:900;font-family:'Noto Sans JP',sans-serif;cursor:pointer;display:none;transition:all 0.2s;}

.coin-pop{position:fixed;pointer-events:none;z-index:9999;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff9c4,#f5c842 45%,#b8860b 85%);box-shadow:0 0 8px rgba(245,200,66,0.9);animation:coinPop 1s ease-out forwards;}
@keyframes coinPop{0%{transform:translateY(0) scale(0.5);opacity:1;}100%{transform:translateY(-70px) scale(1.3);opacity:0;}}

.stage-clear-card{background:linear-gradient(135deg,var(--dark),var(--dark2));border:3px solid var(--gold3);border-radius:20px;padding:2rem;text-align:center;color:var(--gold3);box-shadow:0 8px 32px var(--shadow);}
.stage-clear-card h2{font-size:1.8rem;font-weight:900;text-shadow:0 0 20px rgba(245,200,66,0.5);}
.bonus-num{font-family:'Zen Kaku Gothic New',sans-serif;font-size:2.5rem;font-weight:900;color:var(--gold3);animation:popIn 0.5s ease-out;}
@keyframes popIn{0%{transform:scale(0.4);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
.property-list{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin:1rem 0;}
.prop-badge{padding:0.35rem 0.8rem;background:rgba(245,200,66,0.15);border:1px solid var(--gold3);border-radius:20px;font-size:0.78rem;color:var(--gold3);}
.next-stage-btn{margin-top:1.5rem;padding:0.9rem 2.5rem;background:linear-gradient(135deg,var(--gold3),var(--gold2));color:var(--dark);font-size:1.1rem;font-weight:900;font-family:'Noto Sans JP',sans-serif;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 16px rgba(201,130,10,0.3);transition:all 0.2s;}
.next-stage-btn:hover{transform:scale(1.05);}
.score-display{background:rgba(255,255,255,0.08);border:1px solid rgba(245,200,66,0.3);border-radius:12px;padding:0.7rem 1rem;margin-top:0.8rem;display:flex;gap:1.5rem;justify-content:center;}
.score-item{text-align:center;}
.score-label{font-size:0.68rem;color:var(--gold-light);}
.score-val{font-size:1.1rem;font-weight:900;color:var(--gold3);}
.difficulty-badge{display:inline-block;padding:0.2rem 0.7rem;border-radius:10px;font-size:0.72rem;font-weight:900;margin-bottom:0.5rem;}
.diff-1{background:rgba(46,125,50,0.2);color:#4caf50;border:1px solid #4caf50;}
.diff-2{background:rgba(245,127,23,0.2);color:#ff9800;border:1px solid #ff9800;}
.diff-3{background:rgba(198,40,40,0.2);color:#ef5350;border:1px solid #ef5350;}
</style>
</head>
<body>

<div id="title-screen">
  <div class="coin-rain" id="coinRain"></div>
  <div class="title-episode">EPISODE 1 - 九州地方</div>
  <div class="title-main">世界の大富豪</div>
  <div class="title-badge">🌋 九州編</div>
  <div class="title-sub">5ステージ・75問で九州を完全制覇！</div>
  <div class="title-series">📚 シリーズ：九州 / 中国四国 / 近畿 / 中部 / 関東 / 東北 / 北海道</div>
  <button class="start-btn" id="startBtn">🏆 プレイ開始</button>
  <div class="save-info" id="saveInfo"></div>
</div>

<div id="game-screen">
  <div class="header">
    <div class="header-title">🌋 九州編</div>
    <div class="asset-display">
      <div class="asset-label">総資産</div>
      <div class="asset-amount" id="assetDisplay">0円</div>
    </div>
  </div>
  <div class="stage-bar" id="stageBar"></div>
  <div class="main-content">
    <div id="mainContent">
      <div style="text-align:center;padding:3rem 1rem;color:var(--text3);">
        <div style="font-size:3rem;margin-bottom:1rem;">👆</div>
        <div>上のボタンからステージを選ぼう！</div>
      </div>
    </div>
  </div>
</div>

<script>
// =====================================================
// 問題データ：九州地方（教科書目次準拠・5ステージ×15問）
// =====================================================
const STAGES = [
{
  id:0,
  name:'① 九州の自然環境',
  icon:'🗺️',
  difficulty:1,
  bonus:300000000,
  properties:['阿蘇山観光地','桜島展望台','霧島温泉','有明海干拓地'],
  theme:'九州の地形・気候・自然の特徴を学ぼう',
  questions:[
    {q:'九州地方で最も面積が大きい平野は？',
     c:['筑紫平野','宮崎平野','熊本平野','大隅平野'],a:0,
     exp:'筑紫平野は福岡県・佐賀県にまたがる九州最大の平野。稲作が盛んで、クリークと呼ばれる水路網が発達している。'},
    {q:'熊本県にある、世界最大級のカルデラを持つ火山は？',
     c:['桜島','雲仙岳','阿蘇山','霧島山'],a:2,
     exp:'阿蘇山のカルデラは東西約18km・南北約25kmで世界最大級。カルデラ内に集落や農地が広がる珍しい地形。'},
    {q:'カルデラとはどのような地形？',
     c:['川が運んだ土が積もった平野','火山の噴火・陥没でできた大きなくぼ地','波に削られた海岸','断層でできた盆地'],a:1,
     exp:'カルデラは火山の大噴火後に地盤が陥没してできたくぼ地。鹿児島湾（錦江湾）もカルデラに海水が入ったもの。'},
    {q:'鹿児島湾（錦江湾）はどのようにしてできた地形？',
     c:['川の侵食でできた湾','カルデラに海水が入り込んでできた','サンゴ礁がつくった','断層運動でできた'],a:1,
     exp:'鹿児島湾はカルデラに海水が浸入してできた。湾内には桜島があり、現在も活発に噴火を続けている。'},
    {q:'鹿児島県に位置する、現在も活発に噴火を続けている火山は？',
     c:['雲仙岳','阿蘇山','霧島山','桜島'],a:3,
     exp:'桜島は鹿児島湾内にある活火山。年間1000回以上噴火することもあり、鹿児島市内に降灰をもたらすことが多い。'},
    {q:'九州南部の鹿児島県に広がる、火山灰が積もった台地を何という？',
     c:['関東ローム','シラス台地','讃岐平野','北上高地'],a:1,
     exp:'シラス台地は火山噴出物（軽石・火山灰）が積もった台地。水はけがよく稲作には不向きで、畑作・畜産が中心。'},
    {q:'シラス台地が稲作に不向きな理由は？',
     c:['気温が低すぎるから','水はけがよすぎて水田に水がたまらないから','土地が急傾斜だから','塩分が多いから'],a:1,
     exp:'シラスは軽石質で水はけが非常によい。水田には一定の保水力が必要なため、シラス台地では稲作が難しい。'},
    {q:'九州地方の太平洋側（宮崎県など）の気候の特徴は？',
     c:['年中冷涼で雨が少ない','夏に台風・季節風の影響で降水量が多い','冬に雪が非常に多い','年中乾燥している'],a:1,
     exp:'宮崎県など九州南東部は黒潮（暖流）と夏の季節風の影響で年間降水量が非常に多い。台風の通り道でもある。'},
    {q:'九州西部（長崎県・佐賀県）の海岸線の特徴は？',
     c:['砂浜が続くなだらかな海岸','リアス海岸で複雑に入り組んでいる','断崖絶壁の海岸','干拓が進んでいる'],a:1,
     exp:'長崎県・佐賀県の海岸はリアス海岸が発達。入り組んだ地形は波が穏やかで漁業・養殖に適している。'},
    {q:'有明海の特徴として正しいのは？',
     c:['外洋に面した深い海','干満の差が大きく干拓が行われた内湾','山に囲まれた湖','外国と接する国境の海'],a:1,
     exp:'有明海は日本最大の干満差（最大約6m）を誇る内湾。古くから干拓が行われ農地が造成されてきた。のりの養殖も盛ん。'},
    {q:'九州北部（福岡県など）の気候の特徴は？',
     c:['年中温暖で台風が多い','冬に大陸からの季節風の影響を受けやすい','年中乾燥している','梅雨がない'],a:1,
     exp:'九州北部は冬に大陸から吹く北西の季節風の影響で曇りや雨の日が多い。日本海側気候の特徴を持つ。'},
    {q:'九州地方に多い温泉の分布と関係が深いのは？',
     c:['海流の影響','火山活動が活発なため','降水量が多いため','地形が平らなため'],a:1,
     exp:'九州は火山が多く、地下深部のマグマで熱せられた地下水が温泉として湧出する。大分県の別府・由布院が有名。'},
    {q:'大分県が全国1位を誇るのは？',
     c:['りんごの生産量','米の生産量','温泉の源泉数','漁獲量'],a:2,
     exp:'大分県は別府・由布院など温泉地が集中し、温泉源泉数・湧出量ともに全国1位。火山県ならではの資源。'},
    {q:'九州地方を流れる川の特徴として正しいのは？',
     c:['長く流れが穏やか','山地が多いため短く急流が多い','砂漠を流れる川が多い','全て東に流れる'],a:1,
     exp:'九州は山地が多く川が短くて急流。筑後川（筑紫平野）が最大の川。急流は水力発電にも利用されてきた。'},
    {q:'【地図】阿蘇山（世界最大級のカルデラ）がある熊本県は九州のどこに位置する？',
     c:['九州の最北部','九州の中央部','九州の最南部','九州の西端'],a:1,
     mapHint:'福岡県の南・大分県の西・宮崎県の北西に接する内陸寄りの県',
     exp:'熊本県は九州の中央部に位置する。阿蘇山は熊本県東部にあり、カルデラの中に多くの人が暮らしている。'},
  ]
},
{
  id:1,
  name:'② 火山と人々の生活',
  icon:'🌋',
  difficulty:1,
  bonus:400000000,
  properties:['地熱発電所（八丁原）','温泉旅館（別府）','桜島農園','火山観光施設'],
  theme:'火山がもたらす恵みと災害、人々との関わりを学ぼう',
  questions:[
    {q:'大分県八丁原にある、火山エネルギーを利用した発電所の種類は？',
     c:['水力発電','火力発電','地熱発電','原子力発電'],a:2,
     exp:'地熱発電は火山地帯の地下熱を利用して蒸気をつくり発電する。八丁原は日本最大級の地熱発電所。'},
    {q:'地熱発電のメリットとして正しいのは？',
     c:['燃料費が高い','CO₂をほとんど排出しない再生可能エネルギー','天気に左右される','夜間は発電できない'],a:1,
     exp:'地熱発電は地球の熱エネルギーを利用するため燃料不要・CO₂排出がほぼゼロ。天候に左右されず安定して発電できる。'},

     exp:'水俣市は公害を乗り越え「環境首都」を目指す。ごみ分別（22分別）・有機農業・環境教育など先進的な取り組みを世界に発信。'},

     mapHint:'東シナ海・太平洋に囲まれた九州南西の島々の連なり',
     exp:'南西諸島は九州の南西方向に弧を描いて連なる。沖縄本島・宮古島・石垣島などからなり、台湾に近い位置にある。'},

// =====================================================
// ゲームロジック
// =====================================================
let gs = { totalAsset:0, clearedStages:[], currentStage:null, qIndex:0, correctCount:0 };

function loadGame() {
  try {
    const d = JSON.parse(localStorage.getItem('kyushuTycoon')||'{}');
    if (d.totalAsset !== undefined) gs = {...gs, ...d};
  } catch(e) {}
}
function saveGame() {
  localStorage.setItem('kyushuTycoon', JSON.stringify({totalAsset:gs.totalAsset, clearedStages:gs.clearedStages}));
}
function formatAsset(n) {
  if (n>=1e12) return (n/1e12).toFixed(1)+'兆円';
  if (n>=1e8) return Math.floor(n/1e8)+'億円';
  if (n>=1e4) return Math.floor(n/1e4)+'万円';
  return n.toLocaleString()+'円';
}
function updateAsset() { document.getElementById('assetDisplay').textContent = formatAsset(gs.totalAsset); }

function spawnCoins(x,y,n) {
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='coin-pop';
    el.style.left=(x+(Math.random()-0.5)*50)+'px';
    el.style.top=y+'px';
    el.style.animationDelay=(i*0.08)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1200);
  }
}

function initCoinRain() {
  const c=document.getElementById('coinRain');
  const sizes=['big','med','med','small','small','small'];
  for(let i=0;i<40;i++){
    const d=document.createElement('div');
    const size=sizes[Math.floor(Math.random()*sizes.length)];
    const sparkle=size==='big'&&Math.random()>0.4;
    d.className='coin-drop '+size+(sparkle?' sparkle':'');
    d.style.left=(Math.random()*110-5)+'%';
    d.style.animationDuration=(2.5+Math.random()*4)+'s';
    d.style.animationDelay=(Math.random()*7)+'s';
    c.appendChild(d);
  }
}

function startGame() {
  loadGame();
  document.getElementById('title-screen').style.display='none';
  document.getElementById('game-screen').style.display='block';
  renderStageBar();
  updateAsset();
}

function renderStageBar() {
  const bar=document.getElementById('stageBar');
  bar.innerHTML='';
  STAGES.forEach((s,i)=>{
    const cleared=gs.clearedStages.includes(i);
    const locked=i>0&&!gs.clearedStages.includes(i-1);
    const btn=document.createElement('button');
    btn.className='stage-btn'+(cleared?' cleared':'')+(locked?' locked':'')+(gs.currentStage===i?' active':'');
    btn.textContent=s.icon+' '+s.name;
    if(!locked) btn.addEventListener('click',()=>selectStage(i));
    bar.appendChild(btn);
  });
}

function selectStage(i) {
  gs.currentStage=i; gs.qIndex=0; gs.correctCount=0;
  renderStageBar();
  if(gs.clearedStages.includes(i)) renderCleared(i);
  else renderQuestion();
}

function renderQuestion() {
  const stage=STAGES[gs.currentStage];
  const q=stage.questions[gs.qIndex];
  const total=stage.questions.length;
  const pct=Math.round(gs.qIndex/total*100);
  const labels=['ア','イ','ウ','エ'];
  const diffLabels=['','★☆☆ 基本','★★☆ 標準','★★★ 発展'];
  const diffClass=['','diff-1','diff-2','diff-3'];

  document.getElementById('mainContent').innerHTML=`
    <div class="stage-header">
      <h2>${stage.icon} ${stage.name}</h2>
      <div class="stage-header-sub">${stage.theme}</div>
      <div class="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
        <div class="progress-text">${gs.qIndex}/${total}問　正解 ${gs.correctCount}問</div>
      </div>
    </div>
    <div class="q-card">
      <div class="q-num">
        <span class="difficulty-badge ${diffClass[stage.difficulty]}">${diffLabels[stage.difficulty]}</span>
        　問${gs.qIndex+1}${q.mapHint?' 🗾 地図問題':''}
      </div>
      <div class="q-text">${q.q}</div>
      ${q.mapHint?`<div class="map-hint-box"><div class="hint-label">📍 地図ヒント</div>${q.mapHint}</div>`:''}
      <div class="choices" id="choices">
        ${q.c.map((ch,ci)=>`
          <button class="choice-btn" id="cb${ci}" onclick="answer(${ci})">
            <span class="choice-label">${labels[ci]}</span>${ch}
          </button>`).join('')}
      </div>
      <div class="explanation" id="exp"></div>
      <button class="next-q-btn" id="nextBtn" onclick="nextQ()">
        ${gs.qIndex+1<total?'次の問題へ ▶':'結果を見る 🏆'}
      </button>
    </div>`;
}

function answer(sel) {
  const q=STAGES[gs.currentStage].questions[gs.qIndex];
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const labels=['ア','イ','ウ','エ'];
  const correct=sel===q.a;
  document.getElementById('cb'+q.a).classList.add('correct');
  document.getElementById('cb'+q.a).querySelector('.choice-label').textContent='⭕';
  if(!correct){
    document.getElementById('cb'+sel).classList.add('wrong');
    document.getElementById('cb'+sel).querySelector('.choice-label').textContent='❌';
  } else {
    gs.correctCount++;
    gs.totalAsset+=2000000;
    updateAsset();
    const rect=document.getElementById('assetDisplay').getBoundingClientRect();
    spawnCoins(rect.left+rect.width/2,rect.top+rect.height/2,4);
  }
  const expEl=document.getElementById('exp');
  expEl.className='explanation '+(correct?'correct-exp':'wrong-exp');
  expEl.style.display='block';
  expEl.innerHTML=(correct?'⭕ 正解！　':`❌ 不正解。正解は「${labels[q.a]}：${q.c[q.a]}」　`)+q.exp;
  document.getElementById('nextBtn').style.display='block';
  saveGame();
}

function nextQ() {
  gs.qIndex++;
  if(gs.qIndex>=STAGES[gs.currentStage].questions.length) showClear();
  else renderQuestion();
}

function showClear() {
  const stage=STAGES[gs.currentStage];
  const si=gs.currentStage;
  if(!gs.clearedStages.includes(si)){
    gs.clearedStages.push(si);
    gs.totalAsset+=stage.bonus;
    saveGame();
  }
  updateAsset(); renderStageBar();
  const next=si<STAGES.length-1;
  document.getElementById('mainContent').innerHTML=`
    <div class="stage-clear-card">
      <div style="font-size:3rem">🎉</div>
      <h2>${stage.name} クリア！</h2>
      <div style="color:var(--gold-light);margin:0.5rem 0;font-size:0.85rem">制覇ボーナス</div>
      <div class="bonus-num">+${formatAsset(stage.bonus)}</div>
      <div class="score-display">
        <div class="score-item"><div class="score-label">正解数</div><div class="score-val">${gs.correctCount}/${stage.questions.length}</div></div>
        <div class="score-item"><div class="score-label">総資産</div><div class="score-val">${formatAsset(gs.totalAsset)}</div></div>
      </div>
      <div style="color:var(--gold-light);margin:1rem 0 0.5rem;font-size:0.82rem">取得した物件</div>
      <div class="property-list">${stage.properties.map(p=>`<span class="prop-badge">🏢 ${p}</span>`).join('')}</div>
      ${next
        ?`<button class="next-stage-btn" onclick="selectStage(${si+1})">次のステージへ ▶</button>`
        :`<div style="font-size:1.3rem;color:var(--gold3);margin-top:1rem">🏆 九州地方 完全制覇！<br><span style="font-size:0.9rem">総資産：${formatAsset(gs.totalAsset)}</span></div>`}
    </div>`;
  for(let i=0;i<6;i++) setTimeout(()=>spawnCoins(window.innerWidth/2,window.innerHeight/2,8),i*180);
}

function renderCleared(i) {
  const stage=STAGES[i];
  document.getElementById('mainContent').innerHTML=`
    <div class="stage-clear-card">
      <div style="font-size:2.5rem">✅</div>
      <h2>${stage.name} クリア済み</h2>
      <div class="property-list">${stage.properties.map(p=>`<span class="prop-badge">🏢 ${p}</span>`).join('')}</div>
      <button class="next-stage-btn" style="margin-top:1rem" onclick="replayStage(${i})">もう一度挑戦</button>
    </div>`;
}

function replayStage(i) { gs.qIndex=0; gs.correctCount=0; gs.currentStage=i; renderQuestion(); }

// 初期化
initCoinRain();
(function(){
  function init(){
    document.getElementById('startBtn').addEventListener('click',startGame);
    try{
      const d=JSON.parse(localStorage.getItem('kyushuTycoon')||'{}');
      if(d.totalAsset>0) document.getElementById('saveInfo').textContent='💾 セーブデータあり　総資産：'+formatAsset(d.totalAsset);
    }catch(e){}
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();
})();
</script>
</body>
